<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Reset — Home Training</title>
<meta name="description" content="A 4-day home training plan for fat loss with bodyweight and a 5 kg or 10 kg plate." />
<meta name="theme-color" content="#FAFAFA" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="logo"><span class="mark"></span>Reset</span>
      <span class="tagline">Home · 4 days</span>
    </div>
    <p class="sub">Bodyweight + 5 kg or 10 kg plate · 45–60 min · Fat loss focus</p>
    <nav>
      <button id="nav-home" class="active" onclick="go('home')">Plan</button>
      <button id="nav-hist" onclick="go('history')">Progress</button>
    </nav>
  </header>

  <main id="view"></main>

  <footer>Synced to your Supabase project.</footer>
</div>

<button class="fab" id="fab" aria-label="Rest timer" onclick="toggleTimer()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M9 2h6"/></svg>
</button>
<div class="timer-panel" id="timerPanel">
  <div class="timer-display" id="timerDisplay">1:00</div>
  <div class="presets" id="presets"></div>
  <div class="timer-controls">
    <button class="t-go" id="tGo" onclick="timerToggle()">Start</button>
    <button class="t-reset" onclick="timerReset()">Reset</button>
  </div>
</div>

<div id="modalRoot"></div>

<script type="module" src="./app.js"></script>
</body>
</html>
