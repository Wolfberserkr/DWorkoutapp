<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Reset — Home Training</title>
<meta name="description" content="A 4-day home training plan for fat loss with bodyweight and a 10 kg plate." />
<meta name="theme-color" content="#FAFAFA" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAFA;
  --surface:#FFFFFF;
  --ink:#0A0A0A;
  --ink-2:#404040;
  --ink-3:#737373;
  --ink-4:#A3A3A3;
  --line:#EAEAEA;
  --line-2:#D4D4D4;
  --accent:#10B981;
  --accent-deep:#059669;
  --accent-tint:#ECFDF5;
  --r:10px;
  --r-sm:8px;
  --ease:cubic-bezier(.22,.61,.36,1);
  --maxw:720px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  font-size:15px;
  line-height:1.5;
  letter-spacing:-.011em;
  -webkit-font-smoothing:antialiased;
  padding-bottom:140px;
  min-height:100vh;
}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}

header{padding:32px 0 24px}
.brand{display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-size:20px;font-weight:700;letter-spacing:-.03em;display:flex;align-items:center;gap:8px}
.logo .mark{width:10px;height:10px;background:var(--accent);border-radius:2px}
.tagline{font-size:12px;color:var(--ink-3);font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.sub{margin-top:4px;font-size:13px;color:var(--ink-3)}

nav{display:flex;gap:0;margin-top:24px;border-bottom:1px solid var(--line)}
nav button{
  font:inherit;font-weight:600;font-size:14px;border:0;background:transparent;
  color:var(--ink-3);padding:12px 0;margin-right:24px;cursor:pointer;
  position:relative;transition:color .15s var(--ease);
}
nav button.active{color:var(--ink)}
nav button.active::after{
  content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--ink);
}
nav button:not(.active):hover{color:var(--ink-2)}

.week-bar{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:16px 18px;margin:16px 0 20px;
}
.week-bar .label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-4);font-weight:700}
.week-pick{display:flex;align-items:center;gap:14px;margin-top:6px}
.week-pick .num{font-size:24px;font-weight:700;line-height:1;letter-spacing:-.03em;min-width:24px;text-align:center}
.step{width:30px;height:30px;border-radius:var(--r-sm);border:1px solid var(--line-2);
  background:var(--surface);font-size:16px;font-weight:600;color:var(--ink);cursor:pointer;
  display:grid;place-items:center;transition:.15s var(--ease)}
.step:hover{background:var(--ink);color:var(--surface);border-color:var(--ink)}
.step:active{transform:scale(.94)}
.week-tip{max-width:320px;text-align:right;font-size:12.5px;color:var(--ink-3);line-height:1.5}
.week-tip b{color:var(--ink);font-weight:600}

.days{display:grid;gap:10px}
.day-card{
  display:block;width:100%;text-align:left;cursor:pointer;font:inherit;color:inherit;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:18px;transition:.15s var(--ease);position:relative;
}
.day-card:hover{border-color:var(--ink-3)}
.day-top{display:flex;justify-content:space-between;align-items:center;gap:14px}
.day-info{flex:1;min-width:0}
.day-name{font-size:17px;font-weight:700;letter-spacing:-.02em}
.day-focus{font-size:12px;color:var(--ink-3);margin-top:2px;font-weight:500}
.day-meta{font-size:12px;color:var(--ink-4);margin-top:10px;display:flex;gap:14px;flex-wrap:wrap;font-weight:500}
.day-meta .dot{color:var(--line-2)}
.ring{flex-shrink:0;width:38px;height:38px;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:grid;place-items:center;font-size:10px;font-weight:700;color:var(--ink-2);letter-spacing:-.02em}
.ring.complete .pct{color:var(--accent-deep)}

.back{display:inline-flex;align-items:center;gap:4px;background:none;border:0;font:inherit;
  font-weight:500;font-size:13px;color:var(--ink-3);cursor:pointer;padding:8px 0;margin:6px 0 16px}
.back:hover{color:var(--ink)}
.session-head{margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--line)}
.session-head h2{font-size:28px;font-weight:800;letter-spacing:-.035em;line-height:1.1}
.session-head .focus{color:var(--ink-3);font-weight:500;font-size:13px;margin-top:6px}

.accordion{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.accordion>summary{list-style:none;cursor:pointer;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;
  font-weight:600;font-size:13px;color:var(--ink-2)}
.accordion>summary::-webkit-details-marker{display:none}
.accordion>summary .ico{transition:.2s var(--ease);color:var(--ink-4);font-size:12px}
.accordion[open]>summary .ico{transform:rotate(180deg)}
.accordion .body{padding:4px 18px 16px;font-size:13.5px;color:var(--ink-2);line-height:1.65}
.accordion .body li{margin:4px 0 4px 18px}

.ex{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:10px;transition:.2s var(--ease)}
.ex.done{border-color:var(--accent);background:var(--accent-tint)}
.ex-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.ex-name{font-size:16px;font-weight:700;letter-spacing:-.02em}
.ex-prescribe{font-size:12.5px;color:var(--ink-3);margin-top:3px;font-weight:500}
.ex-load{display:inline-block;font-size:11.5px;color:var(--ink-2);background:var(--bg);
  padding:3px 8px;border-radius:6px;margin-top:8px;font-weight:600;border:1px solid var(--line)}
.ex.done .ex-load{background:var(--surface)}
.ex-done-badge{flex-shrink:0;font-size:11px;font-weight:700;color:var(--accent-deep);display:none;align-items:center;gap:4px;text-transform:uppercase;letter-spacing:.06em}
.ex.done .ex-done-badge{display:inline-flex}

.sets{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.set{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line-2);background:var(--surface);
  border-radius:var(--r-sm);padding:7px 11px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--ink-2);
  transition:.15s var(--ease);user-select:none}
.set:hover{border-color:var(--ink-3)}
.set .box{width:14px;height:14px;border-radius:4px;border:1.5px solid var(--ink-4);display:grid;place-items:center;transition:.15s var(--ease)}
.set .box svg{opacity:0;transform:scale(.6);transition:.15s var(--ease)}
.set.on{background:var(--ink);border-color:var(--ink);color:var(--surface)}
.set.on .box{background:var(--accent);border-color:var(--accent)}
.set.on .box svg{opacity:1;transform:scale(1)}
.set.on:active{transform:scale(.96)}

.logrow{display:flex;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap}
.logrow .field{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-4);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.logrow input{width:60px;font:inherit;font-size:13px;font-weight:600;color:var(--ink);text-align:center;
  border:1px solid var(--line-2);background:var(--surface);border-radius:6px;padding:6px 4px}
.logrow input:focus{outline:none;border-color:var(--ink)}

.vid-toggle{display:inline-flex;align-items:center;gap:6px;margin-top:14px;background:none;border:0;font:inherit;
  font-size:12.5px;font-weight:600;color:var(--ink-2);cursor:pointer;padding:0;border-bottom:1px solid var(--line-2);padding-bottom:1px}
.vid-toggle:hover{color:var(--ink);border-bottom-color:var(--ink)}
.vid-wrap{margin-top:14px;display:none}
.vid-wrap.open{display:block}
.embed{position:relative;width:100%;padding-bottom:56.25%;border-radius:8px;overflow:hidden;background:var(--ink);border:1px solid var(--line)}
.embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.vid-empty{border:1px dashed var(--line-2);border-radius:8px;padding:14px;background:var(--bg)}
.vid-empty p{font-size:12.5px;color:var(--ink-3);margin-bottom:10px}
.vid-empty .row{display:flex;gap:8px}
.vid-empty input{flex:1;font:inherit;font-size:13px;border:1px solid var(--line-2);background:var(--surface);
  border-radius:6px;padding:9px 11px;color:var(--ink)}
.vid-empty input:focus{outline:none;border-color:var(--ink)}
.btn-sm{font:inherit;font-weight:600;font-size:12.5px;border:0;background:var(--ink);color:var(--surface);
  border-radius:6px;padding:9px 14px;cursor:pointer;transition:.15s var(--ease);white-space:nowrap}
.btn-sm:hover{background:var(--ink-2)}
.vid-edit{display:block;margin-top:8px;font-size:11.5px;color:var(--ink-4);background:none;border:0;cursor:pointer;font-weight:500}
.vid-edit:hover{color:var(--ink-2)}

.finish-bar{margin:22px 0 8px;display:flex;gap:8px;flex-wrap:wrap}
.btn{font:inherit;font-weight:600;font-size:14px;border:1px solid var(--line-2);border-radius:var(--r-sm);
  padding:13px 20px;cursor:pointer;transition:.15s var(--ease);background:var(--surface);color:var(--ink)}
.btn:hover{border-color:var(--ink)}
.btn.primary{background:var(--ink);color:var(--surface);border-color:var(--ink);flex:1;min-width:180px}
.btn.primary:hover{background:var(--accent-deep);border-color:var(--accent-deep)}
.btn.primary:disabled{opacity:.35;cursor:not-allowed}
.btn.primary:disabled:hover{background:var(--ink);border-color:var(--ink)}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0 24px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 14px;text-align:left}
.stat .n{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.04em}
.stat .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-4);font-weight:700;margin-top:8px}
.hist-item{display:flex;justify-content:space-between;align-items:center;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;margin-bottom:8px}
.hist-item .when{font-size:12px;color:var(--ink-4);margin-top:3px;font-weight:500}
.hist-item .name{font-weight:700;font-size:14.5px;letter-spacing:-.01em}
.hist-item .tag{font-size:11px;font-weight:700;color:var(--accent-deep);background:var(--accent-tint);padding:4px 9px;border-radius:6px;letter-spacing:.02em}
.empty{text-align:center;color:var(--ink-3);padding:60px 20px}
.empty .big{font-size:18px;color:var(--ink);margin-bottom:6px;font-weight:700;letter-spacing:-.02em}
.empty .small{font-size:13px;color:var(--ink-3)}
.danger{display:block;margin:32px auto 0;background:none;border:0;font:inherit;font-size:12px;font-weight:500;
  color:var(--ink-4);cursor:pointer;text-decoration:underline;text-underline-offset:3px;text-decoration-color:var(--line-2)}
.danger:hover{color:var(--ink-2)}

.fab{position:fixed;right:max(20px,calc((100vw - var(--maxw))/2 + 20px));bottom:24px;z-index:30;
  width:54px;height:54px;border-radius:50%;border:0;background:var(--ink);color:var(--surface);
  box-shadow:0 4px 14px rgba(0,0,0,.18);cursor:pointer;display:grid;place-items:center;
  transition:.15s var(--ease)}
.fab:hover{background:var(--accent-deep);transform:scale(1.05)}
.fab:active{transform:scale(.96)}
.fab svg{width:22px;height:22px}

.timer-panel{position:fixed;right:max(20px,calc((100vw - var(--maxw))/2 + 20px));bottom:90px;z-index:31;
  width:240px;background:var(--surface);border:1px solid var(--line-2);border-radius:14px;
  box-shadow:0 10px 30px -8px rgba(0,0,0,.18);padding:18px;display:none}
.timer-panel.open{display:block}
.timer-display{font-size:46px;font-weight:800;text-align:center;line-height:1;
  font-variant-numeric:tabular-nums;letter-spacing:-.04em}
.timer-display.ring-now{color:var(--accent);animation:pulse .5s ease infinite alternate}
@keyframes pulse{to{opacity:.4}}
.presets{display:flex;gap:5px;justify-content:center;margin:14px 0 12px}
.preset{font:inherit;font-weight:600;font-size:12px;border:1px solid var(--line-2);background:var(--surface);
  border-radius:6px;padding:6px 11px;cursor:pointer;color:var(--ink-2);transition:.15s var(--ease)}
.preset:hover{border-color:var(--ink)}
.preset.sel{background:var(--ink);color:var(--surface);border-color:var(--ink)}
.timer-controls{display:flex;gap:6px}
.timer-controls button{flex:1;font:inherit;font-weight:600;font-size:13px;border:0;border-radius:7px;
  padding:10px;cursor:pointer;transition:.15s var(--ease)}
.t-go{background:var(--accent);color:#fff}
.t-go:hover{background:var(--accent-deep)}
.t-reset{background:var(--bg);color:var(--ink-2);border:1px solid var(--line-2)!important}
.t-reset:hover{border-color:var(--ink)!important}

footer{text-align:center;font-size:11px;color:var(--ink-4);padding:30px 20px 10px;font-weight:500}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="logo"><span class="mark"></span>Reset</span>
      <span class="tagline">Home · 4 days</span>
    </div>
    <p class="sub">Bodyweight + a 10 kg plate · 45–60 min · Fat loss focus</p>
    <nav>
      <button id="nav-home" class="active" onclick="go('home')">Plan</button>
      <button id="nav-hist" onclick="go('history')">Progress</button>
    </nav>
  </header>

  <main id="view"></main>

  <footer>Progress is stored on this device only.</footer>
</div>

<button class="fab" id="fab" aria-label="Rest timer" onclick="toggleTimer()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M9 2h6"/></svg>
</button>
<div class="timer-panel" id="timerPanel">
  <div class="timer-display" id="timerDisplay">1:00</div>
  <div class="presets" id="presets"></div>
  <div class="timer-controls">
    <button class="t-go" id="tGo" onclick="timerToggle()">Start</button>
    <button class="t-reset" onclick="timerReset()">Reset</button>
  </div>
</div>

<script>
const Store=(()=>{
  let mem={},ok=true;
  try{const k='__t';localStorage.setItem(k,'1');localStorage.removeItem(k);}catch(e){ok=false;}
  return{
    get(k){try{return ok?localStorage.getItem(k):mem[k];}catch(e){return mem[k];}},
    set(k,v){try{ok?localStorage.setItem(k,v):mem[k]=v;}catch(e){mem[k]=v;}}
  };
})();

const WARMUP=[
  "3 min light cardio: march in place, jumping jacks, or a brisk walk",
  "20 arm circles each direction · 10 hip circles each side",
  "10 bodyweight squats · 10 glute bridges",
  "5 inchworms with a slow push-up",
  "World's greatest stretch — 3 each side"
];
const COOLDOWN=[
  "Standing forward fold — 30 sec · hold and breathe",
  "Pigeon stretch — 45 sec each side",
  "Doorway chest stretch + overhead triceps reach — 30 sec each",
  "Child's pose — 1 min, slow breaths to lower heart rate"
];

const PLAN=[
 {id:"lower-a",name:"Lower A",focus:"Quads & glutes",ex:[
   {id:"goblet-squat",name:"Goblet Squat",sets:4,reps:"10–12 reps",load:"10 kg plate · 3-sec lower",video:"https://youtu.be/MeIiIdhvXT4"},
   {id:"reverse-lunge",name:"Reverse Lunge",sets:3,reps:"10 / leg",load:"Hold 10 kg at chest",video:"https://youtu.be/RZKXLMxPF_I"},
   {id:"hip-thrust",name:"Glute Bridge",sets:3,reps:"15 reps",load:"10 kg on hips · pause at top",video:"https://youtu.be/wPM8icPu6H8"},
   {id:"lateral-lunge",name:"Lateral Lunge",sets:3,reps:"10 / side",load:"Hold 10 kg at chest",video:"https://youtu.be/R8jArZG2J6Q"},
   {id:"wall-sit",name:"Wall Sit",sets:3,reps:"30–45 sec",load:"Hold 10 kg on lap to progress",video:"https://youtu.be/JaZNYM3zAP0"},
   {id:"plank-a",name:"Plank",sets:3,reps:"30–45 sec",load:"Core · brace tight",video:"https://youtu.be/mH5Sfb_KTGg"},
   {id:"dead-bug",name:"Dead Bug",sets:3,reps:"10 / side",load:"Core · slow tempo",video:"https://youtu.be/bxn9FBrt4-A"}
 ]},
 {id:"upper-a",name:"Upper A",focus:"Push & shoulders",ex:[
   {id:"pushup",name:"Push-up",sets:4,reps:"8–12 reps",load:"Knees or incline to scale",video:"https://youtu.be/WDIpL0pjun0"},
   {id:"ohp",name:"Overhead Press",sets:4,reps:"10–12 reps",load:"10 kg plate · strict",video:"https://youtu.be/BG9ojmx9RyI"},
   {id:"pike",name:"Pike Push-up",sets:3,reps:"8–10 reps",load:"Hips high, head toward floor",video:"https://youtu.be/2b5t0Cu2nQI"},
   {id:"halo",name:"Plate Halo",sets:3,reps:"8 / direction",load:"10 kg around head",video:"https://youtu.be/ymCcWUFUfng"},
   {id:"front-raise",name:"Plate Front Raise",sets:3,reps:"12 reps",load:"10 kg · controlled",video:"https://youtu.be/_DWz24dhDvM"},
   {id:"oh-tri",name:"Overhead Triceps Extension",sets:3,reps:"12 reps",load:"10 kg, both hands",video:"https://youtu.be/AYqg9S5FrUU"},
   {id:"side-plank-a",name:"Side Plank",sets:3,reps:"30 sec / side",load:"Core",video:"https://youtu.be/44ND4bOB-T0"}
 ]},
 {id:"lower-b",name:"Lower B",focus:"Hinge & posterior chain",ex:[
   {id:"rdl",name:"Romanian Deadlift",sets:4,reps:"12 reps",load:"10 kg · slow lower",video:"https://youtu.be/aa57T45iFSE"},
   {id:"bulgarian",name:"Bulgarian Split Squat",sets:3,reps:"10 / leg",load:"Rear foot on chair, hold 10 kg",video:"https://youtu.be/hiLF_pF3EJM"},
   {id:"sl-bridge",name:"Single-leg Glute Bridge",sets:3,reps:"12 / leg",load:"Bodyweight · squeeze top",video:"https://youtu.be/HkF61M6StlY"},
   {id:"sumo-dl",name:"Sumo Deadlift",sets:3,reps:"12 reps",load:"10 kg between feet",video:"https://youtu.be/xgb_WrJ_xtw"},
   {id:"curtsy",name:"Curtsy Lunge",sets:3,reps:"10 / leg",load:"Hold 10 kg at chest",video:"https://youtu.be/g8mCJDtD2DQ"},
   {id:"hollow",name:"Hollow Hold",sets:3,reps:"20–30 sec",load:"Core",video:"https://youtu.be/TNHSgs_orU0"},
   {id:"bird-dog",name:"Bird Dog",sets:3,reps:"10 / side",load:"Core · pause each rep",video:"https://youtu.be/ZdAHe9_HeEw"}
 ]},
 {id:"upper-b",name:"Upper B",focus:"Pull & arms",ex:[
   {id:"inv-row",name:"Inverted Row",sets:4,reps:"8–12 reps",load:"Under a sturdy table",video:"https://youtu.be/6NTruShwwKk"},
   {id:"sa-row",name:"Single-arm Bent-over Row",sets:4,reps:"10 / arm",load:"10 kg · brace on chair",video:"https://youtu.be/pYcpY20QaE8"},
   {id:"pullover",name:"Plate Pullover",sets:3,reps:"12 reps",load:"10 kg, lying on floor",video:"https://youtu.be/Qc4L9I3pHnw"},
   {id:"plate-curl",name:"Plate Curl",sets:3,reps:"12 reps",load:"10 kg · both hands",video:"https://youtu.be/MtXdEcW3Eog"},
   {id:"russian-twist",name:"Plate Russian Twist",sets:3,reps:"20 total",load:"10 kg · feet off floor to progress",video:"https://youtu.be/Yg47UxxV9Vc"},
   {id:"reverse-plank",name:"Reverse Plank",sets:3,reps:"20–30 sec",load:"Posterior chain",video:"https://youtu.be/bnu5b61vqGQ"},
   {id:"superman",name:"Superman",sets:3,reps:"12 reps",load:"Lower back · pause at top",video:"https://youtu.be/jTNpZIl1qU0"}
 ]}
];

const WEEK_TIPS={
 1:["Weeks 1–2","Re-learn the patterns. Keep <b>2–3 reps in reserve</b>. Focus on form and full range. Build the habit."],
 3:["Weeks 3–4","Push the <b>last set</b> close to failure. Aim for the top of each rep range. Tighten rest to 60 sec."],
 5:["Weeks 5–6","Hitting top reps? Slow the lowering phase to <b>3–4 sec</b>. Or add a 4th set to your main lifts."],
 7:["Weeks 7–8","<b>Shorten rest to 45 sec</b> for density. Add a 5-min finisher: alternating squats and push-ups."]
};
function tipForWeek(w){let key=1;[1,3,5,7].forEach(k=>{if(w>=k)key=k;});return WEEK_TIPS[key];}

const KEY="reset_state_v2";
let state=load();
function load(){
  try{const s=JSON.parse(Store.get(KEY));if(s&&s.progress)return s;}catch(e){}
  return{week:1,progress:{},log:{},videos:{},history:[]};
}
function save(){Store.set(KEY,JSON.stringify(state));}

function dayById(id){return PLAN.find(d=>d.id===id);}
function ensure(dayId){
  const d=dayById(dayId);
  if(!state.progress[dayId])state.progress[dayId]={};
  d.ex.forEach(e=>{const a=state.progress[dayId][e.id];
    if(!Array.isArray(a)||a.length!==e.sets)state.progress[dayId][e.id]=new Array(e.sets).fill(false);});
}
function dayCount(dayId){
  ensure(dayId);const d=dayById(dayId);let done=0,total=0;
  d.ex.forEach(e=>{const a=state.progress[dayId][e.id];total+=e.sets;done+=a.filter(Boolean).length;});
  return{done,total,pct:total?Math.round(done/total*100):0};
}

let current="home";
function go(v,arg){
  current=v;
  document.getElementById("nav-home").classList.toggle("active",v==="home"||v==="day");
  document.getElementById("nav-hist").classList.toggle("active",v==="history");
  if(v==="home")renderHome();
  else if(v==="day")renderDay(arg);
  else if(v==="history")renderHistory();
  window.scrollTo({top:0,behavior:"smooth"});
}

function renderHome(){
  const t=tipForWeek(state.week);
  let cards=PLAN.map((d)=>{
    const c=dayCount(d.id);
    const last=lastDone(d.id);
    const circ=2*Math.PI*15, off=circ*(1-c.pct/100);
    return `<button class="day-card" onclick="go('day','${d.id}')">
      <div class="day-top">
        <div class="day-info">
          <div class="day-name">${d.name}</div>
          <div class="day-focus">${d.focus}</div>
          <div class="day-meta">
            <span>${d.ex.length} exercises</span>
            <span class="dot">·</span>
            <span>${last?'Last '+last:'Not started'}</span>
          </div>
        </div>
        <div class="ring ${c.pct===100?'complete':''}">
          <svg width="38" height="38"><circle cx="19" cy="19" r="15" fill="none" stroke="var(--line)" stroke-width="3"/>
          <circle cx="19" cy="19" r="15" fill="none" stroke="${c.pct===100?'var(--accent)':'var(--ink)'}" stroke-width="3"
            stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset .4s var(--ease)"/></svg>
          <span class="pct">${c.pct}%</span>
        </div>
      </div>
    </button>`;
  }).join("");

  document.getElementById("view").innerHTML=`
    <div class="week-bar">
      <div>
        <div class="label">Program week</div>
        <div class="week-pick">
          <button class="step" onclick="bumpWeek(-1)">−</button>
          <span class="num" id="weekNum">${state.week}</span>
          <button class="step" onclick="bumpWeek(1)">+</button>
        </div>
      </div>
      <div class="week-tip"><b>${t[0]}.</b> ${t[1]}</div>
    </div>
    <div class="days">${cards}</div>`;
}
function bumpWeek(n){state.week=Math.min(12,Math.max(1,state.week+n));save();renderHome();}
function lastDone(dayId){
  const h=state.history.filter(x=>x.dayId===dayId);
  if(!h.length)return null;
  return relDate(h[h.length-1].date);
}
function relDate(iso){
  const d=new Date(iso),now=new Date();
  const days=Math.floor((now-d)/86400000);
  if(days<=0)return"today";if(days===1)return"yesterday";if(days<7)return days+"d ago";
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric"});
}

function renderDay(dayId){
  ensure(dayId);
  const d=dayById(dayId);
  const exHtml=d.ex.map((e)=>{
    const a=state.progress[dayId][e.id];
    const done=a.every(Boolean);
    const setsHtml=a.map((on,si)=>`<span class="set ${on?'on':''}" onclick="toggleSet('${dayId}','${e.id}',${si})">
        <span class="box"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>
        Set ${si+1}</span>`).join("");
    const lg=state.log[e.id]||{reps:"",weight:""};
    const vid=effectiveVideo(e);
    return `<div class="ex ${done?'done':''}" id="ex-${e.id}">
      <div class="ex-head">
        <div>
          <div class="ex-name">${e.name}</div>
          <div class="ex-prescribe">${e.sets} × ${e.reps}</div>
          <span class="ex-load">${e.load}</span>
        </div>
        <span class="ex-done-badge">✓ Done</span>
      </div>
      <div class="sets">${setsHtml}</div>
      <div class="logrow">
        <span class="field">Reps <input type="text" inputmode="decimal" placeholder="—" value="${lg.reps}" onchange="logVal('${e.id}','reps',this.value)"></span>
        <span class="field">Wt <input type="text" inputmode="decimal" placeholder="kg" value="${lg.weight}" onchange="logVal('${e.id}','weight',this.value)"></span>
      </div>
      <button class="vid-toggle" onclick="toggleVid('${e.id}')">
        <span id="vlabel-${e.id}">${vid?'Watch demo':'Add demo video'}</span>
      </button>
      <div class="vid-wrap" id="vid-${e.id}">${vid?embedHtml(vid,e.id):emptyVideoHtml(e.id)}</div>
    </div>`;
  }).join("");

  document.getElementById("view").innerHTML=`
    <button class="back" onclick="go('home')">← All sessions</button>
    <div class="session-head">
      <h2>${d.name}</h2>
      <div class="focus">${d.focus} · ${d.ex.length} exercises · Rest 60 sec</div>
    </div>
    <details class="accordion"><summary>Warm-up · 5 min <span class="ico">▾</span></summary>
      <div class="body"><ul>${WARMUP.map(x=>`<li>${x}</li>`).join("")}</ul></div></details>
    <div>${exHtml}</div>
    <details class="accordion" style="margin-top:10px"><summary>Cool-down · 5 min <span class="ico">▾</span></summary>
      <div class="body"><ul>${COOLDOWN.map(x=>`<li>${x}</li>`).join("")}</ul></div></details>
    <div class="finish-bar">
      <button class="btn primary" id="finishBtn" onclick="finishSession('${dayId}')">Finish &amp; log session</button>
      <button class="btn" onclick="resetDay('${dayId}')">Reset</button>
    </div>`;
  updateFinishBtn(dayId);
}

function toggleSet(dayId,exId,i){
  const a=state.progress[dayId][exId];a[i]=!a[i];save();
  const ex=document.getElementById("ex-"+exId);
  const pills=ex.querySelectorAll(".set");
  pills[i].classList.toggle("on",a[i]);
  ex.classList.toggle("done",a.every(Boolean));
  updateFinishBtn(dayId);
  if(a[i])startTimerQuiet();
}
function logVal(exId,k,v){if(!state.log[exId])state.log[exId]={reps:"",weight:""};state.log[exId][k]=v;save();}
function updateFinishBtn(dayId){
  const c=dayCount(dayId);const b=document.getElementById("finishBtn");if(!b)return;
  b.disabled=c.done===0;
  b.textContent=c.done===c.total?"Finish & log session ✓":`Finish & log (${c.done}/${c.total} sets)`;
}
function finishSession(dayId){
  const c=dayCount(dayId);if(c.done===0)return;
  const d=dayById(dayId);
  state.history.push({dayId,name:d.name,date:new Date().toISOString(),done:c.done,total:c.total});
  d.ex.forEach(e=>state.progress[dayId][e.id]=new Array(e.sets).fill(false));
  save();
  go('home');
}
function resetDay(dayId){
  const d=dayById(dayId);
  d.ex.forEach(e=>state.progress[dayId][e.id]=new Array(e.sets).fill(false));
  save();renderDay(dayId);
}

function effectiveVideo(e){return (state.videos[e.id]||e.video||"").trim();}
function parseVideo(url){
  url=(url||"").trim();if(!url)return null;
  let m;
  if((m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)+([\w-]{11})/)))return"https://www.youtube-nocookie.com/embed/"+m[1];
  if((m=url.match(/vimeo\.com\/(?:video\/)?(\d+)/)))return"https://player.vimeo.com/video/"+m[1];
  if(/^[\w-]{11}$/.test(url))return"https://www.youtube-nocookie.com/embed/"+url;
  return null;
}
function embedHtml(raw,exId){
  const src=parseVideo(raw);
  if(!src)return emptyVideoHtml(exId,"Link not recognised — try a YouTube or Vimeo URL.");
  return `<div class="embed"><iframe loading="lazy" src="${src}" title="Exercise demo" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>
    <button class="vid-edit" onclick="editVideo('${exId}')">Change video</button>`;
}
function emptyVideoHtml(exId,msg){
  return `<div class="vid-empty">
    <p>${msg||'Paste a YouTube or Vimeo link to save a demo for this exercise.'}</p>
    <div class="row">
      <input type="text" id="vinput-${exId}" placeholder="https://youtu.be/…" onkeydown="if(event.key==='Enter')saveVideo('${exId}')">
      <button class="btn-sm" onclick="saveVideo('${exId}')">Save</button>
    </div></div>`;
}
function toggleVid(exId){
  const w=document.getElementById("vid-"+exId);
  const open=w.classList.toggle("open");
  const lbl=document.getElementById("vlabel-"+exId);
  const has=!!effectiveVideo(dayCurrentEx(exId));
  lbl.textContent=open?(has?'Hide demo':'Add demo video'):(has?'Watch demo':'Add demo video');
}
function dayCurrentEx(exId){for(const d of PLAN){const e=d.ex.find(x=>x.id===exId);if(e)return e;}}
function saveVideo(exId){
  const v=document.getElementById("vinput-"+exId).value.trim();
  if(!parseVideo(v)){document.getElementById("vid-"+exId).innerHTML=emptyVideoHtml(exId,"Couldn't read that. Try a YouTube or Vimeo URL.");return;}
  state.videos[exId]=v;save();
  document.getElementById("vid-"+exId).innerHTML=embedHtml(v,exId);
  document.getElementById("vlabel-"+exId).textContent="Hide demo";
}
function editVideo(exId){
  document.getElementById("vid-"+exId).innerHTML=emptyVideoHtml(exId);
}

function renderHistory(){
  const h=[...state.history].reverse();
  const total=state.history.length;
  const thisWeek=state.history.filter(x=>(Date.now()-new Date(x.date))<7*86400000).length;
  const days=new Set(state.history.map(x=>new Date(x.date).toDateString())).size;
  let body;
  if(!total){
    body=`<div class="empty"><div class="big">Nothing logged yet</div><div class="small">Finish a session and it'll show up here.</div></div>`;
  }else{
    body=`<div class="stats">
      <div class="stat"><div class="n">${total}</div><div class="l">Sessions</div></div>
      <div class="stat"><div class="n">${thisWeek}</div><div class="l">This week</div></div>
      <div class="stat"><div class="n">${days}</div><div class="l">Active days</div></div>
    </div>`+
    h.map(x=>`<div class="hist-item">
      <div><div class="name">${x.name}</div><div class="when">${new Date(x.date).toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})} · ${new Date(x.date).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}</div></div>
      <span class="tag">${x.done}/${x.total} sets</span>
    </div>`).join("")+
    `<button class="danger" onclick="clearAll()">Clear all saved data</button>`;
  }
  document.getElementById("view").innerHTML=body;
}
function clearAll(){
  if(!confirm("Delete all logged sessions and saved progress on this device?"))return;
  state={week:1,progress:{},log:{},videos:{},history:[]};save();go('history');
}

let tDur=60,tLeft=60,tRun=false,tInt=null;
function renderPresets(){
  document.getElementById("presets").innerHTML=[45,60,90].map(s=>
    `<button class="preset ${s===tDur?'sel':''}" onclick="setPreset(${s})">${s<60?s+'s':(s/60)+'m'+(s%60?(' '+(s%60)+'s'):'')}</button>`).join("");
}
function fmt(s){const m=Math.floor(s/60),x=s%60;return m+":"+String(x).padStart(2,"0");}
function paintTimer(){const el=document.getElementById("timerDisplay");el.textContent=fmt(tLeft);el.classList.toggle("ring-now",tLeft===0);}
function setPreset(s){tDur=s;tLeft=s;tRun=false;clearInterval(tInt);document.getElementById("tGo").textContent="Start";renderPresets();paintTimer();}
function toggleTimer(){const p=document.getElementById("timerPanel");p.classList.toggle("open");renderPresets();paintTimer();}
function timerToggle(){
  if(tRun){tRun=false;clearInterval(tInt);document.getElementById("tGo").textContent="Resume";return;}
  if(tLeft===0)tLeft=tDur;
  tRun=true;document.getElementById("tGo").textContent="Pause";
  tInt=setInterval(()=>{tLeft--;paintTimer();if(tLeft<=0){clearInterval(tInt);tRun=false;document.getElementById("tGo").textContent="Start";doneBeep();}},1000);
}
function timerReset(){tRun=false;clearInterval(tInt);tLeft=tDur;document.getElementById("tGo").textContent="Start";paintTimer();}
function startTimerQuiet(){if(!tRun){tLeft=tDur;paintTimer();}}
function doneBeep(){
  try{const c=new (window.AudioContext||window.webkitAudioContext)();
    [0,.18,.36].forEach(t=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
      o.frequency.value=880;o.start(c.currentTime+t);g.gain.setValueAtTime(.001,c.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.3,c.currentTime+t+.02);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+.16);o.stop(c.currentTime+t+.17);});
  }catch(e){}
  if(navigator.vibrate)navigator.vibrate([200,80,200]);
}

renderPresets();paintTimer();go('home');
</script>
</body>
</html>
